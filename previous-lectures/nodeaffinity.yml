apiVersion: v1
kind: Pod
metadata:
  name: myapp-pod
  labels:
    env: staging-pod
    tier: backend
    service: authentication
spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                  - us-west1-a
                  - us-west1-b
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions: 
              - key: another-node-label-key
                operator: In
                values: 
                  - another-node-label-value
  